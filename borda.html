<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bordas</title>

    <style>

        h1{
            border-color: orange;
            border-style: solid;
            background-color: orange;
            border-top-left-radius: 20px ;
            border-top-right-radius: 20px;
            padding: 10px;
            border-bottom-style:dotted;
            border-bottom-color:black ;
            
        }
        p{
            background-color:rgb(14, 240, 240) ;
            border-left: 12px solid darkslateblue;
            border-right: 12px solid darkslateblue;
            padding: 8px;
            border-radius: 20px;

        }

    </style>
</head>
<body>
    <h1>Modelo d Caixa</h1>
    <p>
        Lorem ipsum dolor, sit amet consectetur adipisicing elit. Nisi optio dignissimos tenetur atque aperiam, aliquam, molestias delectus pariatur doloremque soluta sit amet perferendis debitis quo recusandae laboriosam ex sequi! Provident.
    </p>
</body>
</html>
