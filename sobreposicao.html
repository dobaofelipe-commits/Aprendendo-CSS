        .caixa{
            background-color: purple;
            width: 700px;
            position: relative;
        }

        .destaque{
            position: absolute;
            bottom: 2.5em;
            left: 2em;
            background-color: orange;
            color: white;
            padding: 10px 16px;
            border-radius: 30px;
        }


        .promocao{
            background-color: white;
            color: purple;
            border: 2px dotted purple;
            text-align: center;
            position: absolute;
            bottom: -1.8em;
            padding: 1em;
            left: 10%;
            right: 10%;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
        }

    </style>
