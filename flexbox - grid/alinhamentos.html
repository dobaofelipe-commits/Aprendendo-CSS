<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>

    <style>

        body{
            background-color: black;
        }

        .container-flex{
            border: 1px solid red;
            display: flex;
            width: 400px;
            height: 180px;
            flex-direction: row;
            justify-content: space-between;
        }

        .container-flex>div{
            border: 4px solid white;
            color: white;
            padding: 4px;
            margin: 4px;
        }

    </style>
</head>
<body>
    
    <h1>Alinham entos</h1>


        <div class="container-flex">
            <div>01</div>
            <div>02</div>
            <div>03</div>
            <div>04</div>
            <div>05</div
            </div>
</body>
</html>
