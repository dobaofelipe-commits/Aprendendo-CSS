<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Porentagem e pixel</title>
    <style>
        .pixel {
            border: 1px solid black;
            background-color: red;
            padding: 8px;
            width: 50%;
        }

        .porcentagem{
            width: 90%;
            border: 1px solid red;
            background-color: bisque;
            padding: 8px;
        }

        body {
            border: 1px solid purple;
        }

        #area{
            border: 3px solid black;
            width: 500px;
        }
    </style>
</head>
<body>

    <div class="pixel">
    pixel
    </div>
    
<div class="porcentagem">
    Porcentágem
</div>

<div id="area">
    <div class="pixel">
        pixel
    </div>
    
    <div class="porcentagem">
        Porcentágem
    </div>
</div>


</body>
</html>
