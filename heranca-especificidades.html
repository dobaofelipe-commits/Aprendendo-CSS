<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heranças e Especificidades</title>

    <style>

        /* Herança

        body{
            font-family: Arial, Helvetica, sans-serif;
            font-size: 16px ;
            color: black;
            border: 1px solid red;
            padding: 1em;
            margin: 10px;
        }
        h1{
            font-family: Arial, Helvetica, sans-serif;
            color: violet;
            border: inherit ;
        }

        p{
            border: 1px solid red;
        }
         
        p{
            font-family: Arial, Helvetica, sans-serif;
            color: black;
        }
        ///////////////////////////////////////////////////
        
        p{
            color: blueviolet !important;
        }
        p{
            color: red;
        }

        .destaque{
            color: blue;
        }

        #promocao{
            color: brown;
        }


        Seletores maius específicos
        1) estilo em linha(inline style)
        2)IDs
        3)Classes, atributos e pseudo-classes
        4)Elementos e pseudo-elementos
        caso de empate a ultima regra é processada

            Seletrode atributo
          p[class]{
            color: red;
          }
        */
    </style>
</head>
<body>
        <h1>Título</h1>
        <p class="destaque">Texto padrão</p>
        <p class="teste">
            Lorem, ipsum dolor sit amet consectetur adipisicing elit. Fuga, doloribus aliquam. Consequatur cupiditate aliquid quasi officia natus esse nostrum debitis maiores sint nisi quas, nam expedita magni! Aperiam, nam at!
        </p>
</body>
</html>
