<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menude navegação</title>

    <style>

        #menu ul{
            list-style-type: none;
            padding: 0;
            width: 200px;
        }

        #menu li a{
            display: block;
            padding: 0.5em 1.5em;
            color: black;
            text-decoration: none;
            background-color: #f7b600; 
        }

        #menu li a:hover{
            padding: 0.5em 2.5em;
            color: white;
            background-color: #f99200;
        }

    </style>
</head>
<body>


    <h1>Menu de navegação</h1>
    <div id="menu">
        <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Produtos</a></li>
        <li><a href="#">Carrinho</a></li>
        <li><a href="#">Contato</a></li>
    </ul>
    </div>

    
</body>
</html>
